# Publish the PushPatch CLI to the Windows Package Manager (winget).
#
# On each published GitHub Release, this generates winget manifests from the
# release's Windows .zip and opens a PR to microsoft/winget-pkgs automatically.
#
# Requires repo secret WINGET_TOKEN — a *classic* GitHub PAT with `public_repo`
# scope, on an account that will fork microsoft/winget-pkgs.
name: publish-winget

on:
  release:
    types: [released]      # fires when a release is published (not for drafts)
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.1.0)"
        required: true

jobs:
  winget:
    runs-on: ubuntu-latest
    steps:
      - uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: PushPatch.PushPatch
          # Only the Windows zip asset is a winget installer.
          installers-regex: '-pc-windows-msvc\.zip$'
          # The action derives PackageVersion from the tag (strips a leading "v").
          release-tag: ${{ github.event.release.tag_name || inputs.tag }}
          token: ${{ secrets.WINGET_TOKEN }}
